<!--
  PharmaCare — Cashier POS Screen
  Co-authored by Reshika Amarasinghe & Antigravity (Google DeepMind)
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PharmaCare — Cashier POS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="cashier.css" />
</head>
<body>

  <!-- ====== HEADER ====== -->
  <header class="pos-header">
    <div class="pos-header-left">
      <div class="pos-logo">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="m10.5 20.5 10-10a4.95 4.95 0 1 0-7-7l-10 10a4.95 4.95 0 1 0 7 7Z"/>
          <path d="m8.5 8.5 7 7"/>
        </svg>
        <span id="pos-pharmacy-name">PharmaCare</span>
      </div>
      <div class="pos-divider"></div>
      <div class="pos-role-badge">
        <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect width="20" height="14" x="2" y="5" rx="2"/>
          <line x1="2" x2="22" y1="10" y2="10"/>
        </svg>
        Cashier
      </div>
      <span class="pos-cashier-name" id="pos-cashier-name">—</span>
    </div>
    <div class="pos-header-right">
      <div class="pos-datetime" id="pos-datetime"></div>
      <button class="pos-logout-btn" id="pos-logout-btn" onclick="logout()">
        <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" x2="9" y1="12" y2="12"/>
        </svg>
        Logout
      </button>
    </div>
  </header>

  <!-- ====== MAIN POS AREA ====== -->
  <div class="pos-main">

    <!-- ====== LEFT: Medicine Search ====== -->
    <div class="pos-left">
      <div class="panel-title">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/>
          <path d="m21 21-4.3-4.3"/>
        </svg>
        Search Medicines
      </div>

      <div class="search-bar-wrap">
        <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
          fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/>
          <path d="m21 21-4.3-4.3"/>
        </svg>
        <input type="text" id="medicine-search" class="medicine-search-input"
          placeholder="Type medicine name or generic name..." autocomplete="off" />
        <button class="clear-search" id="clear-search" onclick="clearSearch()" style="display:none">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 6 6 18"/><path d="m6 6 12 12"/>
          </svg>
        </button>
      </div>

      <div class="medicine-list" id="medicine-list">
        <div class="search-prompt">
          <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/>
            <path d="m21 21-4.3-4.3"/>
          </svg>
          <p>Start typing to search for medicines</p>
        </div>
      </div>
    </div>

    <!-- ====== RIGHT: Cart & Billing ====== -->
    <div class="pos-right">

      <!-- Cart Header -->
      <div class="cart-header">
        <div class="panel-title">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/>
            <path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"/>
          </svg>
          Current Bill
        </div>
        <div class="bill-number-display" id="bill-number-display">BILL-????</div>
      </div>

      <!-- Cart Items -->
      <div class="cart-items" id="cart-items">
        <div class="cart-empty" id="cart-empty">
          <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/>
            <path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"/>
          </svg>
          <p>No items in cart</p>
          <span>Search and add medicines from the left panel</span>
        </div>
      </div>

      <!-- Bill Footer -->
      <div class="bill-footer">

        <!-- Payment method -->
        <div class="payment-row">
          <label class="payment-label">Payment Method</label>
          <div class="payment-options">
            <button class="pay-btn active" id="pay-cash" data-method="Cash" onclick="selectPayment('Cash')">
              <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect width="20" height="12" x="2" y="6" rx="2"/>
                <circle cx="12" cy="12" r="2"/>
                <path d="M6 12h.01M18 12h.01"/>
              </svg>
              Cash
            </button>
            <button class="pay-btn" id="pay-card" data-method="Card" onclick="selectPayment('Card')">
              <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect width="20" height="14" x="2" y="5" rx="2"/>
                <line x1="2" x2="22" y1="10" y2="10"/>
              </svg>
              Card
            </button>
            <button class="pay-btn" id="pay-credit" data-method="Credit" onclick="selectPayment('Credit')">
              <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
              </svg>
              Credit
            </button>
            <button class="pay-btn" id="pay-online" data-method="Online" onclick="selectPayment('Online')">
              <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
              </svg>
              Online
            </button>
          </div>
        </div>

        <!-- Total -->
        <div class="total-section">
          <div class="total-row">
            <span class="total-label">Subtotal</span>
            <span class="total-val" id="subtotal-val">Rs. 0.00</span>
          </div>
          <div class="total-row" style="align-items: center; margin-bottom: 5px;">
            <span class="total-label">Discount (Rs.)</span>
            <input type="number" id="discount-val" min="0" step="0.01" placeholder="0.00" style="width: 100px; text-align: right; border: 1px solid rgba(255,255,255,0.15); border-radius: 4px; padding: 4px 8px; background: rgba(255,255,255,0.05); color: #fff; outline: none;" />
          </div>
          <div class="total-row grand">
            <span class="total-label">TOTAL</span>
            <span class="total-val grand-val" id="grand-total-val">Rs. 0.00</span>
          </div>
        </div>

        <!-- Action Buttons -->
        <div class="bill-actions">
          <button class="btn-clear-cart" id="btn-clear-cart" onclick="clearCart()">
            <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/>
              <path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/>
            </svg>
            Clear Cart
          </button>
          <button class="btn-print-bill" id="btn-print-bill" onclick="printBill()">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/>
              <path d="M6 9V3a1 1 0 0 1 1-1h10a1 1 0 0 1 1 1v6"/>
              <rect width="12" height="8" x="6" y="14" rx="1"/>
            </svg>
            Print Bill &amp; Save
          </button>
        </div>

        <div class="items-count-bar" id="items-count-bar">0 items in cart</div>
      </div>

    </div>
  </div>

  <!-- Toast -->
  <div class="pos-toast" id="pos-toast"></div>

  <script src="cashier.js"></script>
</body>
</html>
